<%- include('_header.html') %>

<div class="container mt-4">
  <h2>Products</h2>
  <div class="row row-cols-3" >
    <% for (let i = 0; i < products.length; i++) { %>
    <div class="col mb-4">
      <div class="card h-100">
        <div class="card-body">
          <div class="product-info"># <%= i + 1 %></div>
          <div class="product-info"><%= products[i].name %></div>
          <div class="product-price"><%= products[i].price %>€</div>
          <div class="product-tag"><%= products[i].productTag %></div>
          <button class="btn btn-danger remove-product">Remove item</button>
        </div>
      </div>
    </div>
    <% } %>
  </div>
</div>
