<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/img/favicon.ico" type="image/x-icon"/>
    
    <title> <%= appName %> </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/styles/custom.css" rel="stylesheet" />
  </head>
  <body 
  class="d-flex flex-column min-vh-100"
  <% if (env !== 'production') { %> style="margin-top: 2rem;" <% } %>
  
  >
  <% if (env !== 'production') { %>
    <%- include('_environment.html') %>
    <% } %>

      <header>

      
<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="/"> <%= appName %></a>
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
      aria-controls="navbarNav"
      aria-expanded="false"
      aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav" style="margin:24px">
        <li class="nav-item" style="margin:16px">
          <a class="nav-link" href="/" aria-current="page" href="#">Home</a>
        </li>
        <li class="nav-item" style="margin:16px">
          <a class="nav-link" href="/products" aria-current="page" href="#">Products</a>
        </li>
        <li class="nav-item" style="margin:16px">
          <a class="nav-link" href="/createProduct">Create Product</a>
        </li>
      </ul>
        <% if(!session.userId) {%>
          <a class="btn btn-success" href="/login">Login</a>
        </>
        <% } else { %>
          <a class="btn btn-outline-danger" href="/logout">Logout</a>
          <% } %>
    </div>
  </div>
</nav>
</header>

<main class="flex-grow-1">
